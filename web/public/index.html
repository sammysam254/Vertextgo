<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060B14" />
    <meta name="description" content="Vertex Go — Device Finance Platform" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Vertex Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      RENDER RUNTIME ENV INJECTION
      This script tag is rewritten by render_inject_env.sh at container startup.
      On Render, the start command runs that script before serving the app.
      This lets us use Render environment variables without rebuilding the image.
    -->
    <script>
      window.__env__ = {
        SUPABASE_URL:      "RENDER_SUPABASE_URL_PLACEHOLDER",
        SUPABASE_ANON_KEY: "RENDER_SUPABASE_ANON_KEY_PLACEHOLDER"
      };
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Vertex Go.</noscript>
    <div id="root"></div>
  </body>
</html>
