name: Vertex Go CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Inject Supabase credentials
        run: |
          sed -i "s@\"YOUR_SUPABASE_URL\"@\"${{ secrets.SUPABASE_URL }}\"@g" android/app/build.gradle
          sed -i "s@\"YOUR_SUPABASE_ANON_KEY\"@\"${{ secrets.SUPABASE_ANON_KEY }}\"@g" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Build Release APK
        working-directory: android
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > vertexgo.keystore
            gradle assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/vertexgo.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              --no-daemon
          else
            gradle assembleRelease --no-daemon
          fi
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          VERSION=$(grep 'versionName' android/app/build.gradle | grep -o '"[^"]*"' | tr -d '"')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          find android/app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/ || echo "No APKs found"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: VertexGo-APKs-${{ env.TIMESTAMP }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-${{ env.TIMESTAMP }}
          name: "Vertex Go v${{ env.VERSION }}"
          body: "Built from commit ${{ github.sha }}"
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-web:
    name: Build Web Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build
        env:
          CI: false
          REACT_APP_SUPABASE_URL: "RENDER_SUPABASE_URL_PLACEHOLDER"
          REACT_APP_SUPABASE_ANON_KEY: "RENDER_SUPABASE_ANON_KEY_PLACEHOLDER"

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: vertexgo-web
          path: web/build/
          retention-days: 7

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Render auto-deploys from push — no hook needed"
          fi
